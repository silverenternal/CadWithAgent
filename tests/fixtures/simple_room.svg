<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="400" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Simple room outline: outer walls -->
  <line x1="50" y1="50" x2="450" y2="50" stroke="black" stroke-width="2"/>
  <line x1="450" y1="50" x2="450" y2="350" stroke="black" stroke-width="2"/>
  <line x1="450" y1="350" x2="50" y2="350" stroke="black" stroke-width="2"/>
  <line x1="50" y1="350" x2="50" y2="50" stroke="black" stroke-width="2"/>
  <!-- Interior wall -->
  <line x1="250" y1="50" x2="250" y2="200" stroke="black" stroke-width="2"/>
  <!-- Door opening -->
  <line x1="100" y1="350" x2="150" y2="350" stroke="white" stroke-width="3"/>
</svg>
