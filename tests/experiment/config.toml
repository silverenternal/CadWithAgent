# CadAgent 实验配置文件
# 此文件用于控制实验套件的运行参数

# =============================================================================
# 全局配置
# =============================================================================
[global]
verbose = true
output_dir = "tests/experiment/results"
random_seed = 42
timeout_secs = 300.0

# =============================================================================
# 实验 1: 几何计算准确性验证
# =============================================================================
[exp1_accuracy]
enabled = true
num_samples = 1000
tolerance = 1e-10

# =============================================================================
# 实验 2: 性能基准测试
# =============================================================================
[exp2_performance]
enabled = true
num_samples = 100
data_sizes = [100, 500, 1000]
enable_baseline = true

# =============================================================================
# 实验 3: VLM 推理质量对比
# =============================================================================
[exp3_vlm_reasoning]
enabled = true
num_samples = 20
enable_baseline = true
# api_endpoint = "http://localhost:8000"
# api_key = "your-api-key"

# =============================================================================
# 实验 4: 消融实验
# =============================================================================
[exp4_ablation]
enabled = true
num_samples = 50
test_combinations = true

# =============================================================================
# 实验 5: 真实案例研究
# =============================================================================
[exp5_case_studies]
enabled = true
output_dir = "tests/experiment/results/case_studies"

# =============================================================================
# 实验 6: 对比实验
# =============================================================================
[exp6_comparison]
enabled = true
num_samples = 50
include_commercial = true
include_opensource = true
include_ai_tools = true
